# ---------------------------------------------------------------
# 基础设置
# ---------------------------------------------------------------

# 使用 C‑a 作为前缀键（和 screen 一样），如果你更喜欢默认的 C‑b，可直接删除此行
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 让 tmux 把复制的内容直接写入系统剪贴板（外部剪贴板）
# 这样在 copy‑mode 里使用鼠标或快捷键复制后，Tabby 的“复制到系统剪贴板”
# 功能还能正常工作。 参考 tmux 官方文档的 set‑clipboard 选项【15†L12-L19】
set -g set-clipboard external

# 保留 2000 条历史记录，满足 “历史命令记录设置为2000条” 的需求
# （默认只有 2000 条历史，若你之前调过可能已改小）【1†L36-L38】
set -g history-limit 2000

# ---------------------------------------------------------------
# 鼠标与滚动
# ---------------------------------------------------------------

# 开启完整的鼠标支持（选择、拖动、滚轮等）
set -g mouse on

# Tabby 支持：  
#   • 选中文本 → 右键 → 复制到本机剪贴板  
#   • 右键 → 粘贴本机剪贴板到终端  
# 为了让右键 **不被 tmux 捕获**，把右键事件直接转发给当前 pane
#（即 send‑keys -M），这样 Tabby 的右键粘贴仍然可用。  
# 参考 “Binding mouse buttons in tmux” 中的示例【4†L22-L27】。
bind -n MouseDown2Pane send-keys -M   # 右键 → 直接发送给程序（粘贴）

# 鼠标滚轮向上/向下的默认行为已经被 mouse on 覆盖，
# 这里再明确一点：在复制模式下滚动仍然是滚动缓冲区
bind -n WheelUpPane if-shell -F '#{mouse_any_flag}' \
        'send-keys -M' \
        'if -F "#{pane_in_mode}" "send-keys -M" "copy-mode -e; send-keys -M"'
bind -n WheelDownPane select-pane -t = \; send-keys -M

# ---------------------------------------------------------------
# 美化状态栏
# ---------------------------------------------------------------

# 采用 256‑color 主题，关闭默认的时间显示，自己来写
set -g status-style bg=colour236,fg=colour248
set -g status-left-length 60
set -g status-right-length 120

# 左侧：会话名 + 窗口列表
set -g status-left '#[fg=colour33,bold] #S #[default]'

# 右侧：展示一些常用系统信息
#   • 主机名      #{host}
#   • 负载 (1/5/15)  $(cut -d " " -f1-3 /proc/loadavg)
#   • uptime      $(uptime -p)
#   • 日期时间    %Y-%m-%d %H:%M
#   • 是否在前缀模式（按下前缀键后）：红底 “PREFIX”
#   • 如果你在笔记本上，还可以加上 battery%（需要 tmux‑battery 插件，可选）
#
#   使用 #(...) 调用外部命令，tmux 会每 10 秒（默认）自动刷新。
#
set -g status-right '#[fg=colour39]#(hostname) \
#[fg=colour223]| Load:#(cut -d " " -f1-3 /proc/loadavg) \
#[fg=colour202]| Up:#(uptime -p | sed "s/up //") \
#[fg=colour250]| %Y-%m-%d %H:%M \
#{?client_prefix,#[bg=colour1,fg=colour255] PREFIX ,}'

# ---------------------------------------------------------------
# 其他小改进
# ---------------------------------------------------------------

# 让粘贴时保持原来的缩进（常用的 vi/Emacs copy‑mode）
setw -g mode-keys vi
# 复制模式下使用鼠标拖动即可高亮，Enter 键自动复制到系统剪贴板
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tmux set-buffer -w \"$(cat -)\"; tmux display -p \"Copied to clipboard\""

# 当窗口/面板尺寸改变时自动重绘
set -g aggressive-resize on

# 启动时自动加载 TPM（Tmux Plugin Manager），方便以后自行添加插件
# （如果不需要插件，可直接删除下面三行）
run-shell '~/.tmux/plugins/tpm/tpm'